<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普通物理單字筆記</title>
    <link rel="stylesheet" href="style.css">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <header class="hero">

        </div>

            <h2 id="chapter-title" style="text-align: center; color: #2c3e50;"></h2>
            <div id="word-list"></div>
        </div>

        <div id="example-area" style="display: none;">
            <h2 id="example-title" style="text-align: center; color: #d35400;"></h2>
            <div id="example-list"></div>

    <footer style="text-align: center; padding: 25px 10px; color: #95a5a6; font-size: 0.9em; letter-spacing: 1px;">

    <div class="version-tag">v1.4.15-beta</div>
